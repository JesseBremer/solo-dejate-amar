<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Georgia', serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        #welcome-msg { font-size: 2.2rem; color: #ff6b6b; margin: 0 0 15px 0; text-align: center; }
        #letter { font-size: 1.1rem; max-width: 600px; text-align: center; color: #aaaaaa; font-family: 'Brush Script MT', 'Lucida Handwriting', cursive; }
        #counter-container { margin-top: 20px; font-size: 1rem; color: #ff6b6b; text-align: center; }
        button { margin-top: 30px; padding: 10px 20px; cursor: pointer; background: transparent; border: 1px solid #ff6b6b; color: #ff6b6b; border-radius: 5px; transition: 0.3s; font-family: inherit; }
        button:hover { background: #ff6b6b; color: white; }
        #safe-overlay { display: flex; flex-direction: column; align-items: center; width: 100%; }
        #main-content { display: none; flex-direction: column; align-items: center; width: 100%; }
        .safe-input { padding: 10px; font-size: 1.2rem; text-align: center; border: 1px solid #ff6b6b; background: transparent; color: #ff6b6b; border-radius: 5px; margin-bottom: 20px; outline: none; width: 100%; max-width: 250px; box-sizing: border-box; font-family: inherit; }
        #splash-screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; transition: opacity 1s ease; opacity: 1; }
        .heart-img { width: 250px; height: 250px; object-fit: cover; margin-bottom: 20px; -webkit-mask-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cpath d='M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z'/%3E%3C/svg%3E"); mask-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cpath d='M462.3 62.6C407.5 15.9 326 24.3 275.7 76.2L256 96.5l-19.7-20.3C186.1 24.3 104.5 15.9 49.7 62.6c-62.8 53.6-66.1 149.8-9.9 207.9l193.5 199.8c12.5 12.9 32.8 12.9 45.3 0l193.5-199.8c56.3-58.1 53-154.3-9.8-207.9z'/%3E%3C/svg%3E"); -webkit-mask-size: contain; mask-size: contain; -webkit-mask-position: center; mask-position: center; -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat; }
        .romantic-text { font-family: 'Brush Script MT', 'Lucida Handwriting', cursive; font-size: 3.5rem; color: #ff69b4; text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.4); text-align: center; margin: 0; animation: heartbeat 1.5s infinite; }
        @keyframes heartbeat { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="safe-overlay">
        <h2 style="color: #ff6b6b; margin-bottom: 20px;">Enter Passcode</h2>
        <input type="password" id="passcode" class="safe-input" placeholder="****" onkeydown="if(event.key === 'Enter') checkPasscode()" />
        <button onclick="checkPasscode()">Unlock Safe</button>
        <div id="error-msg" style="color: #ff6b6b; margin-top: 10px; display: none;">Incorrect passcode.</div>
    </div>

    <div id="splash-screen">
        <!-- Be sure to change "your-photo.jpg" below to the exact file name you added to assets/images -->
        <img src="assets\images\PXL_20260514_190927841.jpg" alt="Our Love" class="heart-img">
        <h1 class="romantic-text">Te amo my Queen!</h1>
    </div>

    <div id="main-content">
        <h1 id="welcome-msg">Welcome home, Abigail.</h1>
        <div id="letter"></div>
        <div id="counter-container">
            <div>Days since we met: <span id="daysTogether"></span></div>
            <div id="countdown" style="margin-top: 10px;"></div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px; align-items: stretch; margin-top: 20px;">
            <button onclick="window.location.href='gallery.html'" style="margin-top: 0;">Our Memories</button>
            <button onclick="window.location.href='our-songs.html'" style="margin-top: 0;">Our Songs</button>
            <button onclick="window.location.href='our-story.html'" style="margin-top: 0;">Mi Rendición</button>
            <button onclick="rainRoses()" style="margin-top: 0;">Claim your King!</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // 1. Typing Effect
        const text = "Every moment apart has only made my love for you grow stronger. I can't wait to hold you in my arms again and create new memories together. Always know that you're always in my heart.";
        const el = document.getElementById("letter");
        let i = 0;
        function type() {
            if (i < text.length) {
                el.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 40);
            }
        }

        // 2. Counters
        // Days together
        const startDate = new Date("2026-05-05");
        const daysTogether = Math.floor((new Date() - startDate) / (1000 * 60 * 60 * 24));
        document.getElementById("daysTogether").innerText = daysTogether;

        // Countdown to June 15th
        const targetDate = new Date("2026-06-15T00:00:00");
        const now = new Date();
        const diffInMs = targetDate - now;
        const daysRemaining = Math.ceil(diffInMs / (1000 * 60 * 60 * 24));
        
        document.getElementById("countdown").innerText = 
            daysRemaining > 0 
            ? `${daysRemaining} days until we are together again.` 
            : "The wait is over—see you soon!";

        // 3. Rose Petal Shower
        function rainRoses() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                shapes: ['circle'],
                colors: ['#ff0000', '#ff69b4', '#8b0000']
            });

            const mainContent = document.getElementById("main-content");
            const splashScreen = document.getElementById("splash-screen");
            
            mainContent.style.display = "none";
            splashScreen.style.opacity = "1";
            splashScreen.style.display = "flex";
            
            setTimeout(() => {
                splashScreen.style.opacity = "0"; // Start the fade-out
                setTimeout(() => {
                    splashScreen.style.display = "none";
                    mainContent.style.display = "flex";
                }, 1000); // Wait 1 second for the fade transition to finish
            }, 5000); // Wait exactly 5000 milliseconds (5 seconds)
        }

        // 4. Safe Authentication
        function checkPasscode() {
            const input = document.getElementById("passcode").value;
            if (input === "0505") { // Change this to your desired passcode!
                sessionStorage.setItem("safeUnlocked", "true");
                document.getElementById("safe-overlay").style.display = "none";
                document.getElementById("main-content").style.display = "flex";
                type(); // Delay the typing effect until the safe is unlocked
            } else {
                document.getElementById("error-msg").style.display = "block";
            }
        }

        // Check if the safe was already unlocked in this session
        if (sessionStorage.getItem("safeUnlocked") === "true") {
            document.getElementById("safe-overlay").style.display = "none";
            document.getElementById("main-content").style.display = "flex";
            el.innerHTML = text; // Skip typing effect
            i = text.length; // Prevent type() from running if called elsewhere
        }
    </script>
</body>
</html>
