<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Georgia', serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        #letter { font-size: 1.5rem; max-width: 600px; text-align: center; }
        #counter-container { margin-top: 20px; font-size: 1rem; color: #ff6b6b; text-align: center; }
        button { margin-top: 30px; padding: 10px 20px; cursor: pointer; background: transparent; border: 1px solid #ff6b6b; color: #ff6b6b; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #ff6b6b; color: white; }
    </style>
</head>
<body>

    <div id="letter"></div>
    <div id="counter-container">
        <div>Days since we met: <span id="daysTogether"></span></div>
        <div id="countdown" style="margin-top: 10px;"></div>
    </div>
    <button onclick="rainRoses()">Claim your Prince</button>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // 1. Typing Effect
        const text = "Jesse Bremer, solo déjate amar.";
        const el = document.getElementById("letter");
        let i = 0;
        function type() {
            if (i < text.length) {
                el.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 150);
            }
        }
        type();

        // 2. Counters
        // Days together
        const startDate = new Date("2026-05-05");
        const daysTogether = Math.floor((new Date() - startDate) / (1000 * 60 * 60 * 24));
        document.getElementById("daysTogether").innerText = daysTogether;

        // Countdown to June 15th
        const targetDate = new Date("2026-06-15T00:00:00");
        const now = new Date();
        const diffInMs = targetDate - now;
        const daysRemaining = Math.ceil(diffInMs / (1000 * 60 * 60 * 24));
        
        document.getElementById("countdown").innerText = 
            daysRemaining > 0 
            ? `${daysRemaining} days until we are together.` 
            : "The wait is over—see you soon!";

        // 3. Rose Petal Shower
        function rainRoses() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                shapes: ['circle'],
                colors: ['#ff0000', '#ff69b4', '#8b0000']
            });
        }
    </script>
</body>
</html>
