<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories</title>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Georgia', serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        button { margin-top: 30px; padding: 10px 20px; cursor: pointer; background: transparent; border: 1px solid #ff6b6b; color: #ff6b6b; border-radius: 5px; transition: 0.3s; font-family: inherit; font-size: 1rem; }
        button:hover { background: #ff6b6b; color: white; }
        #gallery-container { display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: 20px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; width: 100%; max-width: 600px; margin-top: 20px; margin-bottom: 30px; }
        .gallery-img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; border: 1px solid #ff69b4; transition: transform 0.3s ease; cursor: pointer; }
        .gallery-img:hover { transform: scale(1.05); }
        
        /* Lightbox Styles */
        #lightbox { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); align-items: center; justify-content: center; flex-direction: column; }
        #lightbox-img { max-width: 90%; max-height: 90%; border-radius: 8px; border: 2px solid #ff69b4; box-shadow: 0 0 20px rgba(255, 105, 180, 0.3); }
        #close-btn { position: absolute; top: 20px; right: 30px; color: #ff6b6b; font-size: 40px; font-weight: bold; cursor: pointer; }
        #close-btn:hover { color: white; }
    </style>
</head>
<body>

    <!-- Lightbox Modal -->
    <div id="lightbox" onclick="closeLightbox()">
        <span id="close-btn">&times;</span>
        <img id="lightbox-img" src="" alt="Enlarged Memory">
    </div>

    <div id="gallery-container">
        <h2 style="color: #ff6b6b; margin-bottom: 10px; font-family: 'Brush Script MT', 'Lucida Handwriting', cursive; font-size: 2.5rem; text-align: center;">Our Beautiful Memories</h2>
        <div class="gallery-grid" id="gallery-grid">
            <!-- Images will be injected here by JavaScript -->
        </div>
        <button onclick="window.location.href='index.html'">Back</button>
    </div>

    <script>
        const grid = document.getElementById("gallery-grid");
        let imageIndex = 1;
        
        function loadNextImage() {
            const img = new Image();
            // This tries to load 1.jpg, then 2.jpg, 3.jpg, etc.
            img.src = `assets/images/gallery/${imageIndex}.jpg`;
            
            img.onload = function() {
                // If the image exists, format it and add it to the gallery
                img.className = "gallery-img";
                img.alt = "Our Memory";
                img.onclick = () => openLightbox(img.src);
                grid.appendChild(img);
                
                // Move to the next number and run the function again
                imageIndex++;
                loadNextImage();
            };
            
            // If the image doesn't exist (onerror), it naturally stops trying to load more.
        }

        function openLightbox(src) {
            document.getElementById("lightbox-img").src = src;
            document.getElementById("lightbox").style.display = "flex";
        }

        function closeLightbox() {
            document.getElementById("lightbox").style.display = "none";
        }

        // Start the loading process
        loadNextImage();
    </script>
</body>
</html>
