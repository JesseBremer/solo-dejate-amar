<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For When You Miss Me</title>
    <style>
        body { background: linear-gradient(135deg, #1a0810 0%, #0f0f0f 100%); color: #e0e0e0; font-family: 'Georgia', serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; justify-content: center; }
        button { padding: 10px 20px; cursor: pointer; background: transparent; border: 1px solid #ff6b6b; color: #ff6b6b; border-radius: 5px; transition: 0.3s; font-family: inherit; font-size: 1rem; margin: 5px; }
        button:hover { background: #ff6b6b; color: white; }
        .title { color: #ff6b6b; font-family: 'Brush Script MT', 'Lucida Handwriting', cursive; font-size: 3rem; text-align: center; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.2); }
        .subtitle { font-size: 1.1rem; margin-bottom: 30px; text-align: center; color: #aaaaaa; max-width: 500px; line-height: 1.5; }
        
        /* CSS Art Jar */
        .jar-wrapper { position: relative; width: 140px; height: 180px; margin: 20px auto 60px; cursor: pointer; perspective: 1000px; }
        .jar-lid { position: absolute; top: -15px; left: 10px; width: 120px; height: 25px; background: linear-gradient(to right, #6b4423, #8b5a2b, #6b4423); border-radius: 5px; z-index: 10; transition: transform 0.4s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .jar-neck { position: absolute; top: 0; left: 15px; width: 110px; height: 10px; background: rgba(255, 255, 255, 0.2); border: 4px solid rgba(255, 255, 255, 0.3); border-bottom: none; border-radius: 10px 10px 0 0; z-index: 4; }
        .jar-glass { position: absolute; top: 10px; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.05); border: 4px solid rgba(255, 255, 255, 0.3); border-top: none; border-radius: 0 0 40px 40px; box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.1), 0 10px 20px rgba(0,0,0,0.5); overflow: hidden; z-index: 5; }
        .jar-glass::after { content: ''; position: absolute; top: 10px; left: 15px; width: 20px; height: 80%; background: rgba(255, 255, 255, 0.15); border-radius: 10px; transform: skewX(-10deg); }
        
        .paper-note { position: absolute; width: 35px; height: 25px; background: #fdf0f4; border-radius: 3px; box-shadow: 1px 1px 4px rgba(0,0,0,0.4); z-index: 2; }
        .paper-note:nth-child(1) { bottom: 15px; left: 20px; transform: rotate(15deg); background: #ffb6c1; }
        .paper-note:nth-child(2) { bottom: 20px; left: 60px; transform: rotate(-20deg); }
        .paper-note:nth-child(3) { bottom: 40px; left: 25px; transform: rotate(45deg); background: #ffc0cb; }
        .paper-note:nth-child(4) { bottom: 35px; left: 75px; transform: rotate(-35deg); }
        .paper-note:nth-child(5) { bottom: 65px; left: 35px; transform: rotate(10deg); background: #ff69b4; }
        .paper-note:nth-child(6) { bottom: 60px; left: 70px; transform: rotate(-15deg); }
        .paper-note:nth-child(7) { bottom: 85px; left: 50px; transform: rotate(30deg); }
        .paper-note:nth-child(8) { bottom: 15px; left: 85px; transform: rotate(-10deg); background: #ffb6c1; }
        .paper-note:nth-child(9) { bottom: 95px; left: 30px; transform: rotate(-25deg); }
        .paper-note:nth-child(10) { bottom: 105px; left: 65px; transform: rotate(15deg); background: #ffc0cb; }
        
        .jar-label { position: absolute; bottom: -45px; left: 50%; transform: translateX(-50%); font-family: 'Brush Script MT', 'Lucida Handwriting', cursive; color: #ff6b6b; font-size: 1.5rem; white-space: nowrap; text-shadow: 1px 1px 3px rgba(255, 105, 180, 0.3); }
        
        .jar-wrapper:hover .jar-lid { transform: translateY(-5px) rotate(3deg); }
        .jar-wrapper:hover { animation: shake 1.5s infinite; }

        #flying-note { position: absolute; top: 60px; left: 55px; width: 30px; height: 20px; background: #fff; border-radius: 2px; box-shadow: 0 0 10px rgba(0,0,0,0.3); z-index: 6; opacity: 0; pointer-events: none; }

        #note-display { display: none; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 105, 180, 0.3); border-left: 4px solid #ff69b4; border-radius: 8px; padding: 30px 40px; margin: 20px 0 40px 0; max-width: 550px; text-align: center; font-family: 'Brush Script MT', 'Lucida Handwriting', cursive; font-size: 2rem; color: #fdf0f4; box-shadow: 0 10px 25px rgba(0,0,0,0.5); opacity: 0; line-height: 1.4; }
        
        @keyframes fadeInNote {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes flyOutNote {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            50% { transform: translateY(-80px) scale(1.5) rotate(20deg); opacity: 1; }
            100% { transform: translateY(-120px) scale(3) rotate(0deg); opacity: 0; }
        }
        
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
            75% { transform: rotate(-1deg); }
        }
        
        @media (max-width: 600px) {
            .title { font-size: 2.5rem; }
            .jar-wrapper { margin: 10px auto 40px; }
            #note-display { font-size: 1.6rem; padding: 25px; }
        }
    </style>
</head>

        let lastIndex = -1;

        function drawNote() {
            const container = document.getElementById('jar-container');
            const lid = document.getElementById('jar-lid');
            const flyingNote = document.getElementById('flying-note');
            const display = document.getElementById('note-display');
            
            // Prevent clicking while animation is running
            if (container.style.pointerEvents === 'none') return;
            
            container.style.pointerEvents = 'none';
            display.style.display = 'none'; // Hide current note
            
            // Animate lid popping off and note flying out
            lid.style.transform = 'translateY(-25px) rotate(15deg)';
            flyingNote.style.animation = 'none';
            void flyingNote.offsetWidth; // Force reflow
            flyingNote.style.animation = 'flyOutNote 1s ease-in-out forwards';
            
            setTimeout(() => {
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * notes.length);
                } while (randomIndex === lastIndex && notes.length > 1);
                lastIndex = randomIndex;
                
                display.innerText = `"${notes[randomIndex]}"`;
                display.style.display = 'block';
                display.style.animation = 'fadeInNote 1.2s ease forwards';
                
                lid.style.transform = 'none'; // Close the lid
                container.style.pointerEvents = 'auto'; // Re-enable clicks
            }, 800); // Trigger right as the flying note finishes
        }
